name: CursorMeterFS
options:
  bundleIdPrefix: com.furkansarikaya
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  CursorMeterFS:
    type: application
    platform: macOS
    sources:
      - path: CursorMeterFS
        excludes:
          - "**/*.md"
    resources:
      - CursorMeterFS/Resources/Assets.xcassets
      - CursorMeterFS/Resources/Info.plist
      # Provider brand icons (template SVGs) — files copied flat into Resources/
      - path: CursorMeterFS/Resources/ProviderIcons
        buildPhase: resources
      # Bundled so SelfSigningService can reuse it at runtime instead of
      # duplicating the cert-creation logic in Swift. Symlink to scripts/
      # sign-local.sh (single source of truth) — XcodeGen resources must live
      # under a target's source tree to be picked up correctly.
      - path: CursorMeterFS/Resources/sign-local.sh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.furkansarikaya.CursorMeterFS
        PRODUCT_NAME: CursorMeterFS
        INFOPLIST_FILE: CursorMeterFS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CursorMeterFS/Resources/CursorMeterFS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 4
        MARKETING_VERSION: 1.1.1
        # Link against SQLite (system framework — no extra dependency)
        OTHER_LDFLAGS: "-lsqlite3"
        # Security: disable unnecessary capabilities
        ENABLE_APP_SANDBOX: NO  # Needed to read ~/Library/Application Support/Cursor/...
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          # Ad-hoc signing for Debug — no provisioning profile needed, Xcode Previews work
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_ENTITLEMENTS: ""
          ENABLE_HARDENED_RUNTIME: NO
          CODE_SIGNING_REQUIRED: NO
    dependencies:
      - sdk: Cocoa.framework
      - sdk: Security.framework
      - sdk: ServiceManagement.framework
      - sdk: UserNotifications.framework

  CursorMeterFSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - CursorMeterFSTests
    dependencies:
      - target: CursorMeterFS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.furkansarikaya.CursorMeterFSTests
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/CursorMeterFS.app/Contents/MacOS/CursorMeterFS
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  CursorMeterFS:
    build:
      targets:
        CursorMeterFS: all
        CursorMeterFSTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: CursorMeterFSTests
          randomExecutionOrder: true
          parallelizable: true
    archive:
      config: Release

configs:
  Debug:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_ENTITLEMENTS: ""
      ENABLE_HARDENED_RUNTIME: NO
  Release:
    settings:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      DEAD_CODE_STRIPPING: YES
