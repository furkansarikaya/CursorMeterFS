name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release (ad-hoc signed)
        run: |
          xcodebuild \
            -scheme CursorMeter \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Locate .app
        id: app_path
        run: |
          APP=$(find build/DerivedData -name "CursorMeter.app" -maxdepth 6 | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "CursorMeter" \
            -srcfolder "${{ steps.app_path.outputs.path }}" \
            -ov \
            -format UDZO \
            "build/CursorMeter-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/CursorMeter-${{ github.ref_name }}.dmg
          generate_release_notes: true
          body: |
            ## CursorMeter ${{ github.ref_name }}

            macOS menu bar app to monitor your Cursor AI subscription usage.

            ### Installation
            1. Download `CursorMeter-${{ github.ref_name }}.dmg`
            2. Open the DMG → drag CursorMeter to Applications
            3. On first launch: **System Settings → Privacy & Security → Open Anyway**
            4. Launch CursorMeter — it detects your Cursor login automatically

            ### Requirements
            - macOS 13.0+
            - Cursor installed and signed in
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
