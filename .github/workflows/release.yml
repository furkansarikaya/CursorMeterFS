name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          # Pick the highest-versioned Xcode available on this runner
          LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]' | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -switch "/Applications/$LATEST/Contents/Developer"
          fi
          xcodebuild -version
          xcrun swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild \
            -scheme CursorMeterFS \
            -configuration Release \
            -destination "platform=macOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            build

      - name: Locate .app
        id: app_path
        run: |
          APP=$(find build/DerivedData -name "CursorMeterFS.app" -maxdepth 6 | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP"

      - name: Re-sign with proper ad-hoc signature
        run: |
          # Ensures Info.plist is bound and resources are sealed — required on macOS 26+
          codesign --force --deep --sign - "${{ steps.app_path.outputs.path }}"
          codesign --verify --deep "${{ steps.app_path.outputs.path }}"
          codesign -dv "${{ steps.app_path.outputs.path }}" 2>&1

      - name: Create DMG
        run: |
          # Stage app + Applications symlink so users see the drag-to-install UI
          mkdir -p build/dmg_staging
          cp -R "${{ steps.app_path.outputs.path }}" build/dmg_staging/
          ln -s /Applications build/dmg_staging/Applications

          hdiutil create \
            -volname "CursorMeterFS" \
            -srcfolder build/dmg_staging \
            -ov \
            -format UDZO \
            "build/CursorMeterFS-${{ github.ref_name }}.dmg"

      - name: Checksum DMG
        working-directory: build
        run: |
          shasum -a 256 "CursorMeterFS-${{ github.ref_name }}.dmg" \
            > "CursorMeterFS-${{ github.ref_name }}.dmg.sha256"
          cat "CursorMeterFS-${{ github.ref_name }}.dmg.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "build/CursorMeterFS-${{ github.ref_name }}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/CursorMeterFS-${{ github.ref_name }}.dmg
            build/CursorMeterFS-${{ github.ref_name }}.dmg.sha256
          generate_release_notes: true
          body: |
            ## CursorMeterFS ${{ github.ref_name }}

            macOS menu bar app to monitor your Codex, Claude Code, and Cursor usage.

            ### Installation
            1. Download `CursorMeterFS-${{ github.ref_name }}.dmg`
            2. Open the DMG → drag CursorMeterFS to Applications
            3. Clear the Gatekeeper quarantine flag (this app isn't notarized — see
               "Is this safe?" below): `xattr -cr /Applications/CursorMeterFS.app`
               — or go to **System Settings → Privacy & Security → Open Anyway**
            4. Launch CursorMeterFS — it detects your local Codex/Claude/Cursor logins automatically

            ### Is this safe?
            CursorMeterFS is signed but not Apple-notarized (notarization requires a paid
            Apple Developer account this open-source project doesn't carry) — that's the
            entire reason macOS warns on first launch, not a finding about the code. You
            can verify this build independently instead of trusting Apple's notarization:
            - **Checksum:** verify `CursorMeterFS-${{ github.ref_name }}.dmg.sha256` against
              the downloaded file with `shasum -a 256 -c CursorMeterFS-${{ github.ref_name }}.dmg.sha256`
            - **Provenance:** confirm this exact DMG was built by GitHub Actions from this
              tagged source with `gh attestation verify CursorMeterFS-${{ github.ref_name }}.dmg --repo ${{ github.repository }}`
            - **Source:** the full app is open source in this repo; see also
              [`security-report/SECURITY-REPORT.md`](https://github.com/${{ github.repository }}/blob/main/security-report/SECURITY-REPORT.md)

            ### Requirements
            - macOS 13.0+ (tested on macOS 26)
            - At least one of: Codex CLI, Claude Code, or Cursor installed and signed in
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
