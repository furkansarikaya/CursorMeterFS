<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0e0e24"/>
      <stop offset="100%" stop-color="#19103e"/>
    </linearGradient>

    <!-- Arc progress: blue → indigo → purple -->
    <linearGradient id="arcGrad" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2563eb"/>
      <stop offset="55%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <!-- Arc end cap glow -->
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Cursor drop shadow -->
    <filter id="cursorShadow" x="-25%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="4" dy="8" stdDeviation="14"
                    flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <!-- Subtle inner highlight on background -->
    <radialGradient id="innerGlow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#5b5fc7" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square (macOS app icon shape) -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#innerGlow)"/>

  <!-- Track ring (dim background) -->
  <circle cx="512" cy="512" r="356"
          fill="none"
          stroke="rgba(255,255,255,0.07)"
          stroke-width="48"/>

  <!-- Progress ring — 72 % filled, starts from 12 o'clock -->
  <!-- Circumference = 2π × 356 ≈ 2237  |  72% ≈ 1611  |  gap ≈ 626 -->
  <circle cx="512" cy="512" r="356"
          fill="none"
          stroke="url(#arcGrad)"
          stroke-width="48"
          stroke-dasharray="1611 626"
          stroke-linecap="round"
          transform="rotate(-90 512 512)"
          filter="url(#arcGlow)"/>

  <!-- Glowing dot at arc end (~72% = 259°) -->
  <!-- 72% * 360 - 90 = 169.2°  →  x = 512 + 356·cos(169.2°), y = 512 + 356·sin(169.2°) -->
  <circle cx="162" cy="580" r="22" fill="#a855f7" opacity="0.9" filter="url(#arcGlow)"/>

  <!-- Cursor arrow — classic pointer, tip upper-left, centered in ring -->
  <!-- Local path: tip at origin, bounding box ~178 × 272 px               -->
  <!-- translate(370, 290) scale(1.62) puts visual center near (512, 510)  -->
  <g transform="translate(370, 290) scale(1.62)" filter="url(#cursorShadow)">
    <path d="M 0 0
             L 0 222
             L 63 163
             L 108 274
             L 142 261
             L 97 150
             L 178 150
             Z"
          fill="white"/>
  </g>

  <!-- Hotspot accent dot at cursor tip -->
  <circle cx="370" cy="290" r="10" fill="#818cf8" opacity="0.85"/>
</svg>
